<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>שו״ת אגרות משה – מפתח</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
<link href="styles.css" rel="stylesheet">
</head>
<body>

<div class="sefer-header">
  <h1>שו״ת אגרות משה</h1>
  <div class="sub">מפתח הסימנים</div>
</div>

<div class="container">

  <!-- Search -->
  <div class="search-wrap">
    <input type="search" id="searchInput" class="form-control"
           placeholder="חיפוש בכל הכרכים..." autocomplete="off">
  </div>

  <!-- Search results (hidden by default) -->
  <div class="search-results" id="searchResults"></div>

  <!-- Volume grid (hidden when searching) -->
  <div class="vol-grid" id="volGrid"></div>

</div>

<div class="container">
  <div class="sefer-footer">
    מקור: <a href="https://hebrewbooks.org" target="_blank" rel="noopener">HebrewBooks.org</a>
  </div>
</div>

<script src="data.js"></script>
<script src="search.js"></script>
<script>
(function() {
  const grid = document.getElementById('volGrid');
  const searchInput = document.getElementById('searchInput');
  const searchResults = document.getElementById('searchResults');

  // Render volume cards
  function renderGrid() {
    let html = '<div class="row g-3">';
    for (const vol of VOLUMES) {
      const count = countSimanim(vol);
      const isEmpty = count === 0;
      const cls = isEmpty ? 'vol-card empty' : 'vol-card';
      const href = isEmpty ? '#' : 'vol' + vol.id + '.html';

      html += `
        <div class="col-6 col-md-4">
          <a href="${href}" class="${cls}">
            <div class="vol-title">${vol.title}</div>
            ${vol.subtitle ? '<div class="vol-sub">' + vol.subtitle + '</div>' : ''}
            <div class="vol-count">${isEmpty ? 'בקרוב' : count + ' סימנים'}</div>
          </a>
        </div>`;
    }
    html += '</div>';
    grid.innerHTML = html;
  }

  // Render global search results grouped by volume
  function renderSearchResults(query) {
    const results = searchAll(query);

    if (results.length === 0) {
      searchResults.innerHTML = '<div class="no-results">לא נמצאו תוצאות</div>';
      return;
    }

    // Group by volume
    const groups = {};
    for (const r of results) {
      if (!groups[r.volId]) groups[r.volId] = { title: r.volTitle, items: [] };
      groups[r.volId].items.push(r);
    }

    let html = '';
    for (const volId of Object.keys(groups)) {
      const g = groups[volId];
      html += `<div class="result-group-title">${g.title}</div>`;
      html += '<ul class="siman-list">';
      for (const r of g.items) {
        html += `<li><a href="${r.url}" target="_blank" rel="noopener">
          <div class="siman-top">
            <span class="siman-name">סימן ${r.siman}׳</span>
            <span class="page-num">${r.page}</span>
          </div>
          <div class="siman-desc">${r.desc}</div>
        </a></li>`;
      }
      html += '</ul>';
    }

    searchResults.innerHTML = html;
  }

  // Search handler
  let debounce;
  searchInput.addEventListener('input', function() {
    clearTimeout(debounce);
    const q = this.value.trim();

    debounce = setTimeout(function() {
      if (q.length > 0) {
        grid.style.display = 'none';
        searchResults.classList.add('active');
        renderSearchResults(q);
      } else {
        searchResults.classList.remove('active');
        searchResults.innerHTML = '';
        grid.style.display = '';
      }
    }, 200);
  });

  renderGrid();
})();
</script>

</body>
</html>
