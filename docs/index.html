<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>אגרות משה – מפתח</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
<link href="styles.css" rel="stylesheet">
</head>
<body>

<div class="sefer-header">
  <h1>אגרות משה</h1>
  <div class="sub">מפתח הסימנים</div>
</div>

<div class="container">

  <!-- Search -->
  <div class="search-wrap">
    <input type="search" id="searchInput" class="form-control"
           placeholder="חיפוש בכל הכרכים..." autocomplete="off">
  </div>

  <!-- Search results (hidden by default) -->
  <div class="search-results" id="searchResults"></div>

  <!-- Volume grid (hidden when searching) -->
  <div class="vol-grid" id="volGrid">
    <div class="text-center py-4" style="color:var(--ink-faint);">טוען...</div>
  </div>

</div>

<div class="container">
  <div class="sefer-footer">
    מקור: <a href="https://hebrewbooks.org" target="_blank" rel="noopener">HebrewBooks.org</a>
  </div>
</div>

<script src="data.js"></script>
<script src="search.js"></script>
<script>
(function() {
  var grid = document.getElementById('volGrid');
  var searchInput = document.getElementById('searchInput');
  var searchResults = document.getElementById('searchResults');

  function renderGrid() {
    var html = '<div class="row g-3">';
    for (var i = 0; i < VOLUMES.length; i++) {
      var vol = VOLUMES[i];
      var count = countSimanim(vol);
      var isEmpty = count === 0;
      var cls = isEmpty ? 'vol-card empty' : 'vol-card';
      var href = isEmpty ? '#' : 'vol' + vol.id + '.html';

      html += '<div class="col-6 col-md-4">'
        + '<a href="' + href + '" class="' + cls + '">'
        + '<div class="vol-title">' + vol.title + '</div>'
        + (vol.subtitle ? '<div class="vol-sub">' + vol.subtitle + '</div>' : '')
        + (isEmpty ? '<div class="vol-count">בקרוב</div>' : '')
        + '</a></div>';
    }
    html += '</div>';
    grid.innerHTML = html;
  }

  function renderSearchResults(query) {
    var results = searchAll(query);

    if (results.length === 0) {
      searchResults.innerHTML = '<div class="no-results">לא נמצאו תוצאות</div>';
      return;
    }

    // Group by volume
    var groups = {};
    var order = [];
    for (var i = 0; i < results.length; i++) {
      var r = results[i];
      if (!groups[r.volId]) {
        groups[r.volId] = { title: r.volTitle, items: [] };
        order.push(r.volId);
      }
      groups[r.volId].items.push(r);
    }

    var html = '';
    for (var j = 0; j < order.length; j++) {
      var g = groups[order[j]];
      html += '<div class="result-group-title">' + g.title + '</div>';
      html += '<ul class="siman-list">';
      for (var k = 0; k < g.items.length; k++) {
        var it = g.items[k];
        html += '<li><a href="' + it.url + '" target="_blank" rel="noopener">'
          + '<div class="siman-top">'
          + '<span class="siman-name">סימן ' + it.siman + '</span>'
          + '<span class="page-num">' + it.page + '</span>'
          + '</div>'
          + '<div class="siman-desc">' + it.desc + '</div>'
          + '</a></li>';
      }
      html += '</ul>';
    }

    searchResults.innerHTML = html;
  }

  var debounce;
  searchInput.addEventListener('input', function() {
    clearTimeout(debounce);
    var q = this.value.trim();
    debounce = setTimeout(function() {
      if (q.length > 0) {
        grid.style.display = 'none';
        searchResults.classList.add('active');
        renderSearchResults(q);
      } else {
        searchResults.classList.remove('active');
        searchResults.innerHTML = '';
        grid.style.display = '';
      }
    }, 200);
  });

  // Load all volumes then render
  loadAllVolumes().then(function() {
    renderGrid();
  });
})();
</script>

</body>
</html>
