<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>אגרות משה – כרך א׳</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
<link href="styles.css" rel="stylesheet">
</head>
<body>

<div class="sefer-header">
  <h1 id="volTitle"><a href="index.html" style="color:inherit;text-decoration:none;">אגרות משה</a></h1>
  <div class="sub" id="volSub">טוען...</div>
</div>

<div class="container">

  <a href="index.html" class="back-link">→ חזרה לכל הכרכים</a>

  <!-- Search -->
  <div class="search-wrap">
    <input type="search" id="searchInput" class="form-control"
           placeholder="חיפוש בכל הכרכים..." autocomplete="off">
  </div>

  <!-- Content -->
  <div id="content">
    <div class="text-center py-4" style="color:var(--ink-faint);">טוען...</div>
  </div>

</div>

<div class="container">
  <div class="sefer-footer">
    מקור: <a href="https://hebrewbooks.org" target="_blank" rel="noopener">HebrewBooks.org</a>
  </div>
</div>

<script src="data.js"></script>
<script src="search.js"></script>
<script>
(function() {
  var VOL_ID = 1; // <-- Change this number for each volume page

  var content = document.getElementById('content');
  var searchInput = document.getElementById('searchInput');

  loadAllVolumes().then(function() {
    var vol = getVolume(VOL_ID);
    if (!vol) { content.innerHTML = '<p>לא נמצא כרך</p>'; return; }

    document.getElementById('volSub').textContent = vol.title + (vol.subtitle ? ' – ' + vol.subtitle : '');
    document.title = 'אגרות משה – ' + vol.title;

    function renderVolume() {
      var html = '';
      var BASE = 'https://hebrewbooks.org/pdfpager.aspx?req=' + vol.hebrewBooksReq + '&pgnum=';
      for (var s = 0; s < vol.sections.length; s++) {
        var sec = vol.sections[s];
        if (!sec.simanim || sec.simanim.length === 0) continue;
        if (sec.name) {
          html += '<div class="section-title">' + sec.name + '</div>';
        }
        html += '<ul class="siman-list">';
        for (var i = 0; i < sec.simanim.length; i++) {
          var arr = sec.simanim[i];
          var url = BASE + arr[0];
          html += '<li><a href="' + url + '" target="_blank" rel="noopener">'
            + '<div class="siman-top">'
            + '<span class="siman-name">סימן ' + arr[1] + '</span>'
            + '<span class="page-num">' + arr[0] + '</span>'
            + '</div>'
            + '<div class="siman-desc">' + arr[2] + '</div>'
            + '</a></li>';
        }
        html += '</ul>';
      }
      content.innerHTML = html;
    }

    function renderSearchResults(query) {
      var results = searchAll(query);
      if (results.length === 0) {
        content.innerHTML = '<div style="text-align:center;padding:40px 16px;color:var(--ink-faint);">לא נמצאו תוצאות</div>';
        return;
      }
      var groups = {};
      var order = [];
      for (var i = 0; i < results.length; i++) {
        var r = results[i];
        if (!groups[r.volId]) {
          groups[r.volId] = { title: r.volTitle, items: [] };
          order.push(r.volId);
        }
        groups[r.volId].items.push(r);
      }
      var html = '';
      for (var j = 0; j < order.length; j++) {
        var g = groups[order[j]];
        html += '<div class="result-group-title">' + g.title + '</div>';
        html += '<ul class="siman-list">';
        for (var k = 0; k < g.items.length; k++) {
          var it = g.items[k];
          html += '<li><a href="' + it.url + '" target="_blank" rel="noopener">'
            + '<div class="siman-top">'
            + '<span class="siman-name">סימן ' + it.siman + '</span>'
            + '<span class="page-num">' + it.page + '</span>'
            + '</div>'
            + '<div class="siman-desc">' + it.desc + '</div>'
            + '</a></li>';
        }
        html += '</ul>';
      }
      content.innerHTML = html;
    }

    var debounce;
    searchInput.addEventListener('input', function() {
      clearTimeout(debounce);
      var q = this.value.trim();
      debounce = setTimeout(function() {
        if (q.length > 0) {
          renderSearchResults(q);
        } else {
          renderVolume();
        }
      }, 200);
    });

    renderVolume();
  });
})();
</script>

</body>
</html>
